<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Receiver</title>
  
  <!-- 1. Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. Socket.io Client (Will connect to the same server hosting this file) -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* Custom Animations */
    @keyframes pulse-glow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.95); }
    }
    .animate-pulse-slow { animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    .text-shadow-md { text-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    .text-shadow-lg { text-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3); }
  </style>
</head>
<body class="bg-black text-white overflow-hidden h-screen w-screen m-0 p-0 font-sans">

  <!-- CONTAINER -->
  <div id="app-container" class="relative w-full h-full flex flex-col justify-center items-center text-center p-8 sm:p-16 select-none">
    
    <!-- Background Layer -->
    <div id="bg-layer" class="absolute inset-0 bg-cover bg-center transition-all duration-1000 opacity-50"></div>
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/70 to-black-95"></div>
    
    <!-- Glow Blobs -->
    <div class="absolute inset-0 pointer-events-none mix-blend-screen opacity-40">
      <div class="absolute top-1/4 left-1/4 w-[600px] h-[600px] bg-purple-700 rounded-full blur-[180px] opacity-20"></div>
      <div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-sky-600 rounded-full blur-[180px] opacity-20 animate-pulse"></div>
    </div>

    <!-- Status Indicator (Top Right) -->
    <div id="status-indicator" class="absolute top-6 right-6 z-30 flex items-center gap-2 font-mono text-[10px] text-white/50 uppercase tracking-widest bg-black/50 px-3 py-1 rounded-full border border-white/10 backdrop-blur-sm">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <!-- Corner Badge -->
    <div class="absolute top-6 left-6 z-30 flex items-center gap-2 font-mono text-[10px] text-white/30 uppercase tracking-widest">
      <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Live Casting
    </div>

    <!-- Content Layer -->
    <div id="content-layer" class="relative z-20 max-w-5xl w-full">
      <!-- Dynamic Content will be injected here via JS -->
    </div>
  </div>

  <!-- LOGIC SCRIPT -->
  <script>
    // 1. Initialize Socket
    const socket = io();
    
    // 2. State Management
    let currentState = {
      type: 'idle',
      content: null,
      background: { url: 'https://images.unsplash.com/photo-1515787366009-7cbdd2dc587b?auto=format&fit=crop&q=80&w=1200' },
      fontSize: 40
    };

    // 3. Helper: Font Sizing (Ported from React)
    function getSizes(content, size) {
      let base = (size || 44);
      const total = (content?.textHi?.length || 0) + (content?.textEn?.length || 0) || content?.text?.length || 0;
      const scale = total > 350 ? 0.52 : total > 250 ? 0.65 : total > 160 ? 0.78 : total > 90 ? 0.92 : 1.0;
      return {
        hi: Math.max(16, Math.round(base * 1.2 * scale)) + 'px',
        en: Math.max(14, Math.round(base * 0.95 * scale)) + 'px',
        title: Math.round((size || 40) * 1.2) + 'px',
        text: Math.round((size || 40) * 0.8) + 'px'
      };
    }

    // 4. Render Function
    function render() {
      const container = document.getElementById('content-layer');
      const bgLayer = document.getElementById('bg-layer');
      const statusDot = document.getElementById('status-dot');
      const statusText = document.getElementById('status-text');

      // Update Background
      if (currentState.background && currentState.background.url) {
        bgLayer.style.backgroundImage = `url(${currentState.background.url})`;
      }

      // Render Content based on type
      if (currentState.type === 'idle') {
        container.innerHTML = `
          <div class="flex flex-col items-center gap-5 animate-pulse-slow">
            <div class="w-20 h-20 rounded-full bg-slate-800 flex items-center justify-center text-slate-600 font-bold text-3xl">TV</div>
            <p class="text-slate-400 text-sm font-mono uppercase tracking-widest">Standby — Waiting for cast</p>
            <p class="text-slate-600 text-[10px] font-mono mt-2">Connected to server</p>
          </div>
        `;
      } 
      else if (currentState.type === 'verse') {
        const content = currentState.content;
        const sizes = getSizes(content, currentState.fontSize);
        
        container.innerHTML = `
          <div class="flex flex-col items-center">
            ${(content.textHi || content.text) ? `
              <h2 style="font-size: ${sizes.hi}" class="font-serif font-bold text-white leading-relaxed mb-4 text-shadow-lg">
                ${content.textHi || content.text}
              </h2>
            ` : ''}
            
            ${content.textHi && content.textEn ? '<div class="h-px w-32 bg-sky-400/40 mb-4 rounded-full"></div>' : ''}
            
            ${content.textHi && content.textEn ? `
              <h3 style="font-size: ${sizes.en}" class="font-serif italic text-slate-300 leading-relaxed mb-8 text-shadow-md">
                "${content.textEn}"
              </h3>
            ` : ''}

            ${!content.textHi && content.text ? `
              <h2 style="font-size: ${sizes.hi}" class="font-serif italic text-white leading-relaxed mb-8 text-shadow-lg">
                "${content.text}"
              </h2>
            ` : ''}

            <div class="h-px w-48 bg-white/20 mb-6 rounded-full"></div>
            <p class="text-xl font-mono tracking-[0.4em] uppercase text-sky-400 font-extrabold">
              ${content.book} ${content.chapter}:${content.verse}
            </p>
          </div>
        `;
      } 
      else if (currentState.type === 'slide') {
        const content = currentState.content;
        const sizes = getSizes(content, currentState.fontSize);

        if (content.image) {
           // NEW LOGIC: Check if text is enabled
           if (content.showText !== false) {
             // Show Grid Layout (Image + Text)
             container.innerHTML = `
               <div class="grid md:grid-cols-2 gap-10 items-center w-full">
                 <img src="${content.image}" class="max-h-[65vh] object-contain rounded-xl border border-white/10 shadow-2xl mx-auto" />
                 <div class="text-left">
                   <p class="text-sky-400 text-sm font-mono uppercase tracking-widest mb-2">${content.title}</p>
                   <div class="h-px w-16 bg-sky-500 mb-4"></div>
                   <p style="font-size: ${sizes.text}" class="text-slate-100 leading-relaxed">${content.text}</p>
                 </div>
               </div>
             `;
           } else {
             // Show Centered Image Only (No Text)
             container.innerHTML = `
               <div class="w-full h-full flex items-center justify-center">
                 <img src="${content.image}" class="max-h-[85vh] max-w-full object-contain rounded-xl shadow-2xl" />
               </div>
             `;
           }
        } else {
           // Slide Text Only (No Image)
           container.innerHTML = `
             <div class="flex flex-col items-center">
               ${content.subtitle ? `<span class="text-xs text-sky-400 font-bold uppercase tracking-[0.3em] bg-sky-950/50 ring-1 ring-sky-500/30 px-5 py-2 rounded-full mb-6">${content.subtitle}</span>` : ''}
               
               <h4 style="font-size: ${sizes.title}" class="font-sans font-extrabold uppercase leading-tight text-shadow-lg mb-8">
                 ${content.title}
               </h4>
               
               <div class="h-px w-48 bg-white/20 mb-8 rounded-full"></div>
               
               <p style="font-size: ${sizes.text}" class="text-slate-100 max-w-3xl leading-relaxed">
                 ${content.text}
               </p>
             </div>
           `;
        }
      }
    }

    // 5. Socket Events
    socket.on('connect', () => {
      console.log('TV Connected');
      document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981]";
      document.getElementById('status-text').innerText = "Online";
      socket.emit('get-state'); // Request current state
    });

    socket.on('disconnect', () => {
      console.log('TV Disconnected');
      document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-rose-500 animate-pulse";
      document.getElementById('status-text').innerText = "Offline";
    });

    socket.on('state-sync', (data) => {
      if (data) {
        currentState = data;
        render();
      }
    });

    socket.on('display-update', (data) => {
      console.log('TV Update:', data);
      if (data) {
        currentState = data;
        render();
      }
    });

    // Initial Render
    render();

  </script>
</body>
</html>
